spring.application.name=ms-security

spring.mongodb.uri=${MONGODB_URI}
spring.mongodb.database=${MONGODB_DATABASE}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

github.client-id=${GITHUB_CLIENT_ID}
github.client-secret=${GITHUB_CLIENT_SECRET}

google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
google.frontend-url=${GOOGLE_FRONTEND_URL}

microsoft.tenant-id=${MICROSOFT_TENANT_ID}
microsoft.client-id=${MICROSOFT_CLIENT_ID}
microsoft.client-secret=${MICROSOFT_CLIENT_SECRET}

app.frontend-url=${GOOGLE_FRONTEND_URL}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

recaptcha.secret.v3=${RECAPTCHA_SECRET_V3}
recaptcha.verify-url=${RECAPTCHA_VERIFY_URL}